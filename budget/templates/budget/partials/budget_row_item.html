<tr class="budget-row-item {% if is_nested %}budget-row-nested{% endif %} group">
    <td class="py-3 px-4">
        <div class="flex items-center gap-2.5">
            <span class="font-mono font-black text-[10px] text-indigo-600 opacity-60 tracking-tight" title="ID utilisable dans les formules">{{ item.short_id }}</span>
            <div class="font-medium text-gray-800 editable-cell px-2 py-0.5 rounded transition-colors hover:bg-gray-100 cursor-edit min-w-0"
                 contenteditable="true"
                 data-orig-nom="{{ item.ligne_budgetaire.nom }}"
                 hx-post="{% url 'budget:item_update' item.pk %}"
                 hx-trigger="blur"
                 hx-target="closest tr"
                 hx-swap="outerHTML"
                 hx-vals='js:{"field": "nom", "value": event.target.innerText}'
                 hx-on::response-error="budgetNomError(this, event)">
                {{ item.ligne_budgetaire.nom }}
            </div>
        </div>
    </td>
    <td class="text-right py-3 px-4 font-mono relative">
        <span class="editable-cell cursor-edit px-2 py-1 rounded hover:bg-gray-100" 
              contenteditable="true"
              data-formula="{{ item.formula_moyen|default:'' }}"
              onfocus="if(this.dataset.formula) this.innerText = this.dataset.formula"
              hx-post="{% url 'budget:item_update' item.pk %}"
              hx-trigger="blur"
              hx-target="closest tr"
              hx-swap="outerHTML"
              hx-vals='js:{"field": "scenario_moyen", "value": event.target.innerText}'>
            {{ item.scenario_moyen|floatformat:2 }}
        </span>
    </td>
    <td class="text-right py-3 px-4 font-mono text-muted">
        {{ item.realise|floatformat:2 }}
    </td>
    <td class="py-3 px-4">
        <div class="budget-comment-cell editable-cell cursor-edit" 
            style="max-height: 4rem; overflow-y: auto; border: 1px solid var(--color-gray-200); border-radius: 4px; padding: 4px 8px; background-color: #fafafa; word-break: break-word; overflow-wrap: anywhere; white-space: normal; font-size: 0.85rem;"
            contenteditable="true"
            hx-post="{% url 'budget:item_update' item.pk %}"
            hx-trigger="blur"
            hx-target="closest tr"
            hx-swap="outerHTML"
            hx-vals='js:{"field": "commentaire", "value": event.target.innerText}'>
            {{ item.commentaire|default:"" }}
        </div>
    </td>
    <td class="text-right py-3 px-4">
        <form hx-post="{% url 'budget:delete_line' item.pk %}" 
              hx-target="#budget-main-content" 
              hx-select="#budget-main-content" 
              hx-swap="outerHTML show:none"
              hx-confirm="Supprimer cette ligne ?"
              class="inline">
            {% csrf_token %}
            <button type="submit" class="text-danger opacity-20 hover:opacity-100 transition-opacity" 
                    title="Supprimer">
                <i data-lucide="trash-2" width="16"></i>
            </button>
        </form>
    </td>
</tr>
